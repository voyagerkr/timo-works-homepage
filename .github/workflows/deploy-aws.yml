name: Deploy to AWS (S3 + CloudFront) - qa/prod

# 정적 사이트 배포: pnpm build → S3 sync → CloudFront 무효화.
# 전제: IaC/homepage 의 terraform apply 완료 (버킷/배포 생성됨).
#  - 버킷       : timo-works-homepage-<env>
#  - CloudFront : Comment == "homepage-<env>" 로 배포 조회
# (이전 GitHub Pages 워크플로우 deploy-pages.yml 은 비활성/삭제 권장)

on:
  push:
    branches: [ "qa", "prod" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve environment by branch
        run: |
          ENV="${{ github.ref_name }}"
          echo "ENVIRONMENT=$ENV" >> $GITHUB_ENV
          echo "S3_BUCKET=timo-works-homepage-${ENV}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install & build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 + invalidate CloudFront
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}" --delete
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='homepage-${ENVIRONMENT}'].Id | [0]" --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          else
            echo "CloudFront 배포(homepage-${ENVIRONMENT})를 찾지 못함 — 무효화 건너뜀"
          fi

      - name: Summary
        run: |
          echo "## Homepage Deploy (${ENVIRONMENT})" >> $GITHUB_STEP_SUMMARY
          echo "Bucket: ${S3_BUCKET}"                >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}"           >> $GITHUB_STEP_SUMMARY
